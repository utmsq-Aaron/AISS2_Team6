# One-host deployment of the FitDash MCP servers.
#
# Each own server runs as its own standalone FastMCP service (Streamable HTTP) —
# exactly the "everything as independent, distributable MCP services" model. Today
# they all live on one host; moving any of them to another machine later is just a
# changed *_MCP_URL in the app's config — no code change.
#
# The app (ToolHost) runs on the host and reaches the servers via the published
# localhost ports below (Host header 127.0.0.1 → passes FastMCP's DNS-rebinding
# protection without any server-side change). To run the app *inside* compose too,
# point *_MCP_URL at the service names and widen each server's allowed_hosts.
#
#   docker compose up --build weather-mcp routes-mcp strava-mcp garmin-mcp calendar-mcp

services:
  weather-mcp:
    build: .
    environment:
      SERVER: servers.weather_mcp
      WEATHER_MCP_HOST: 0.0.0.0
      WEATHER_MCP_PORT: "8101"
    ports: ["8101:8101"]
    restart: unless-stopped

  routes-mcp:
    build: .
    env_file: .env            # ORS_API_KEY
    environment:
      SERVER: servers.routes_mcp
      ROUTES_MCP_HOST: 0.0.0.0
      ROUTES_MCP_PORT: "8102"
    ports: ["8102:8102"]
    restart: unless-stopped

  calendar-mcp:
    build: .
    env_file: .env            # GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET (read-only)
    environment:
      SERVER: servers.calendar_mcp
      CALENDAR_MCP_HOST: 0.0.0.0
      CALENDAR_MCP_PORT: "8105"
    ports: ["8105:8105"]
    restart: unless-stopped

  strava-mcp:
    build: .
    env_file: .env            # CLIENT_ID / CLIENT_SECRET + .tokens/strava.json
    environment:
      SERVER: servers.strava_mcp
      STRAVA_MCP_HOST: 0.0.0.0
      STRAVA_MCP_PORT: "8103"
    ports: ["8103:8103"]
    restart: unless-stopped

  garmin-mcp:
    build: .
    env_file: .env
    environment:
      SERVER: servers.garmin_mcp
      GARMIN_MCP_HOST: 0.0.0.0
      GARMIN_MCP_PORT: "8104"
    ports: ["8104:8104"]
    restart: unless-stopped
