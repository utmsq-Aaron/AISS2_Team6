# One-host deployment of the FitDash MCP servers.
#
# Each own server runs as its own standalone FastMCP service (Streamable HTTP) —
# exactly the "everything as independent, distributable MCP services" model. Today
# they all live on one host; moving any of them to another machine later is just a
# changed *_MCP_URL in the app's config — no code change.
#
# The app (ToolHost) runs on the host and reaches the servers via the published
# localhost ports below (Host header 127.0.0.1 → passes FastMCP's DNS-rebinding
# protection without any server-side change). To run the app *inside* compose too,
# point *_MCP_URL at the service names and widen each server's allowed_hosts.
#
#   docker compose up --build weather-mcp routes-mcp strava-mcp garmin-mcp calendar-mcp

services:
  weather-mcp:
    build: .
    environment:
      SERVER: servers.weather_mcp
      WEATHER_MCP_HOST: 0.0.0.0
      WEATHER_MCP_PORT: "8101"
    ports: ["8101:8101"]
    restart: unless-stopped

  routes-mcp:
    build: .
    env_file: .env            # ORS_API_KEY
    environment:
      SERVER: servers.routes_mcp
      ROUTES_MCP_HOST: 0.0.0.0
      ROUTES_MCP_PORT: "8102"
    ports: ["8102:8102"]
    restart: unless-stopped

  calendar-mcp:
    build: .
    env_file: .env            # GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET (read-only)
    environment:
      SERVER: servers.calendar_mcp
      CALENDAR_MCP_HOST: 0.0.0.0
      CALENDAR_MCP_PORT: "8105"
    ports: ["8105:8105"]
    restart: unless-stopped

  strava-mcp:
    build: .
    env_file: .env            # CLIENT_ID / CLIENT_SECRET + .tokens/strava.json
    environment:
      SERVER: servers.strava_mcp
      STRAVA_MCP_HOST: 0.0.0.0
      STRAVA_MCP_PORT: "8103"
    ports: ["8103:8103"]
    restart: unless-stopped

  garmin-mcp:
    build: .
    env_file: .env
    environment:
      SERVER: servers.garmin_mcp
      GARMIN_MCP_HOST: 0.0.0.0
      GARMIN_MCP_PORT: "8104"
    ports: ["8104:8104"]
    restart: unless-stopped

  # ── A2A agent layer (LangGraph specialists + orchestrator) ──────────────────
  # Each agent reuses the same image but overrides the command (it runs an agent
  # module, not servers.*_mcp). Inside the compose network agents reach each other
  # and the MCP servers by service name; the host app reaches the orchestrator via
  # the published :9000. Each agent needs the LLM env (OPENAI_* / AGENT_MODEL /
  # AGENT_LLM_MODEL) supplied through .env.
  recovery-agent:
    build: .
    env_file: .env
    command: ["python", "-m", "agents.recovery_agent"]
    environment:
      A2A_BIND_HOST: 0.0.0.0
      RECOVERY_A2A_URL: http://recovery-agent:9001/
      GARMIN_MCP_URL: http://garmin-mcp:8104/mcp
    ports: ["9001:9001"]
    depends_on: [garmin-mcp]
    restart: unless-stopped

  load-agent:
    build: .
    env_file: .env
    command: ["python", "-m", "agents.load_agent"]
    environment:
      A2A_BIND_HOST: 0.0.0.0
      LOAD_A2A_URL: http://load-agent:9002/
      STRAVA_MCP_URL: http://strava-mcp:8103/mcp
      GARMIN_MCP_URL: http://garmin-mcp:8104/mcp
    ports: ["9002:9002"]
    depends_on: [strava-mcp, garmin-mcp]
    restart: unless-stopped

  context-agent:
    build: .
    env_file: .env
    command: ["python", "-m", "agents.context_agent"]
    environment:
      A2A_BIND_HOST: 0.0.0.0
      CONTEXT_A2A_URL: http://context-agent:9003/
      WEATHER_MCP_URL: http://weather-mcp:8101/mcp
      CALENDAR_MCP_URL: http://calendar-mcp:8105/mcp
    ports: ["9003:9003"]
    depends_on: [weather-mcp, calendar-mcp]
    restart: unless-stopped

  route-agent:
    build: .
    env_file: .env
    command: ["python", "-m", "agents.route_agent"]
    environment:
      A2A_BIND_HOST: 0.0.0.0
      ROUTE_A2A_URL: http://route-agent:9004/
      ROUTES_MCP_URL: http://routes-mcp:8102/mcp
    ports: ["9004:9004"]
    depends_on: [routes-mcp]
    restart: unless-stopped

  orchestrator-agent:
    build: .
    env_file: .env            # OPENAI_* / AGENT_MODEL / AGENT_LLM_MODEL
    command: ["python", "-m", "core.orchestrator_agent"]
    environment:
      A2A_BIND_HOST: 0.0.0.0
      ORCHESTRATOR_A2A_URL: http://orchestrator-agent:9000/
      RECOVERY_A2A_URL: http://recovery-agent:9001/
      LOAD_A2A_URL: http://load-agent:9002/
      CONTEXT_A2A_URL: http://context-agent:9003/
      ROUTE_A2A_URL: http://route-agent:9004/
    ports: ["9000:9000"]
    depends_on: [recovery-agent, load-agent, context-agent, route-agent]
    restart: unless-stopped

  # telegram-mcp is NOT a native FastMCP server: servers/telegram_mcp.py is a proxy
  # that shells out to `uv run` against the external github.com/chigwell/telegram-mcp
  # checkout. That needs `uv` + the cloned repo, which the shared python:3.11-slim
  # image above does not provide — so run it on the HOST instead:
  #     TELEGRAM_MCP_HOST=0.0.0.0 python -m servers.telegram_mcp   # :8106
  # (or build a dedicated image that installs uv and clones external/telegram-mcp).
